services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  go-server:
    image: ${GO_SERVER_IMAGE:?GO_SERVER_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ./go-server/.env
    environment:
      REDIS_ADDR: redis:6379
      SHADOW_OUTPUT_ROOT: /tmp/shadow
      SCAN_QUEUE_NAME: "scan:queue"
      SCAN_PROCESSING_NAME: "scan:processing"
      SCAN_MAX_CONCURRENT: "20"
      SCAN_MAX_QUEUE_CAPACITY: "20"
    ports:
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  sonarqube-worker:
    image: ${GO_SERVER_IMAGE:?GO_SERVER_IMAGE is required}
    restart: unless-stopped
    entrypoint: ["/sonarqube-worker"]
    env_file:
      - ./go-server/.env
    environment:
      REDIS_ADDR: redis:6379
      SONAR_ENABLE_BRANCH_ANALYSIS: "false"
      SONAR_SCANNER_OPTS: -Xmx2g
      NODE_OPTIONS: --max-old-space-size=2048
      SONAR_JS_NODE_MAXSPACE: "4096"
      SHADOW_OUTPUT_ROOT: /tmp/shadow
      SONARQUBE_WORKER_CONCURRENCY: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      go-server:
        condition: service_started

  fastapi-gateway:
    image: ${FASTAPI_GATEWAY_IMAGE:?FASTAPI_GATEWAY_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ./fastapi-gateway/.env
    environment:
      GRPC_SERVER_ADDR: go-server:50051
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      go-server:
        condition: service_started
